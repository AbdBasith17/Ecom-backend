upstream django_server {
    server web:8000;
}

server {
    listen 80;
    server_name perfaura-api.duckdns.org;


    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name perfaura-api.duckdns.org;

    
    ssl_certificate /etc/nginx/ssl/live/perfaura-api.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/perfaura-api.duckdns.org/privkey.pem;


    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location / {
        proxy_pass http://django_server;

    
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

       
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $server_name;

        
        proxy_pass_header Set-Cookie;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }

   
    location /static/ {
        alias /app/ecom/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /media/ {
        alias /app/ecom/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
