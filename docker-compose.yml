                                                                              
version: '3.8'

services:
  web:
    build: .

    command: gunicorn --bind 0.0.0.0:8000 --chdir ecom ecom.wsgi:application
    volumes:
      - .:/app
      - static_volume:/app/ecom/staticfiles

    env_file:
      - .env
    expose:
      - "8000"
    restart: always

  nginx:
    build: ./nginx
    volumes:
      - static_volume:/app/ecom/staticfiles
      - /etc/letsencrypt:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    restart: always

volumes:
  static_volume: