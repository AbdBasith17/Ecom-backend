version: '3.8'

services:
  web:
    build: .
   
    command: gunicorn --bind 0.0.0.0:8000 --chdir ecom ecom.wsgi:application
    volumes:
      - .:/app
      - static_volume:/app/ecom/staticfiles
      - media_volume:/app/ecom/media
    env_file:
      - .env
    expose:
      - "8000"
    restart: always

  nginx:
    build: ./nginx
    volumes:
      - static_volume:/app/ecom/staticfiles
      - media_volume:/app/ecom/media
    ports:
      - "80:80"
    depends_on:
      - web
    restart: always

volumes:
  static_volume:
  media_volume: