services:
  # CONTAINER 1: THE DATABASE
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file: .env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # CONTAINER 2: THE DJANGO APP (GUNICORN)
  web:
    build: .
    
    command: gunicorn --bind 0.0.0.0:8000 --chdir ecom ecom.wsgi:application --workers 3
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  # CONTAINER 3: THE REVERSE PROXY (NGINX)
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./ecom/staticfiles:/app/staticfiles
      - ./ecom/media:/app/media
    depends_on:
      - web

volumes:
  postgres_data: